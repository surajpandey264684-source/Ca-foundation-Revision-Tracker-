<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f0f0f"/>
<title>CA Revision Tracker</title>
<link rel="manifest" href="manifest.json"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #e5e5e5; font-family: 'Courier New', monospace; min-height: 100vh; }
  .header { background: #1a1a1a; border-bottom: 2px solid #facc15; padding: 14px 16px; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
  .header-left .sub { font-size: 10px; color: #facc15; letter-spacing: 3px; font-weight: bold; }
  .header-left .title { font-size: 18px; font-weight: bold; color: #fff; }
  .header-right { text-align: right; font-size: 10px; color: #666; }
  .overdue-badge { background: #ef4444; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 2px; margin-top: 4px; display: inline-block; }
  .container { padding: 14px; max-width: 600px; margin: 0 auto; }
  .add-box { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 12px; margin-bottom: 14px; }
  .add-label { font-size: 10px; color: #facc15; letter-spacing: 2px; margin-bottom: 10px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .row2 { display: flex; gap: 8px; }
  select, input { background: #111; border: 1px solid #333; color: #e5e5e5; padding: 8px; border-radius: 2px; font-size: 12px; font-family: inherit; width: 100%; }
  .add-btn { background: #facc15; color: #000; border: none; padding: 8px 16px; border-radius: 2px; font-size: 12px; font-family: inherit; font-weight: bold; cursor: pointer; white-space: nowrap; }
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab { background: #1a1a1a; color: #666; border: 1px solid #333; padding: 6px 14px; border-radius: 2px; font-size: 11px; font-family: inherit; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
  .tab.active { background: #facc15; color: #000; border-color: #facc15; }
  .empty { color: #444; text-align: center; padding: 40px; font-size: 13px; }
  .card { background: #1a1a1a; border: 1px solid #333; border-radius: 3px; padding: 12px; margin-bottom: 8px; }
  .card.overdue { border-color: #ef4444; }
  .due-card { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 2px; font-weight: bold; color: #000; display: inline-block; }
  .rev-label { font-size: 10px; font-weight: bold; color: #facc15; }
  .rev-label.overdue { color: #ef4444; }
  .topic { font-size: 13px; color: #e5e5e5; margin: 4px 0; }
  .date-info { font-size: 10px; color: #555; }
  .done-btn { background: #10b981; color: #fff; border: none; padding: 6px 12px; border-radius: 2px; font-size: 11px; font-family: inherit; font-weight: bold; cursor: pointer; white-space: nowrap; }
  .all-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .rev-btns { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .rev-btn { padding: 4px 10px; border-radius: 2px; font-size: 10px; font-family: inherit; font-weight: bold; cursor: default; border: 1px solid #333; background: #111; color: #444; }
  .rev-btn.done { background: #10b981; color: #fff; border-color: #10b981; }
  .rev-btn.overdue { background: #ef4444; color: #fff; border-color: #ef4444; cursor: pointer; }
  .rev-btn.ready { color: #facc15; border-color: #facc15; cursor: pointer; }
  .del-btn { background: none; color: #444; border: none; font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .lect-no { font-size: 10px; color: #666; }
  .install-btn { background: #1a1a1a; border: 1px solid #facc15; color: #facc15; padding: 6px 12px; border-radius: 2px; font-size: 11px; font-family: inherit; cursor: pointer; display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="sub">CA FOUNDATION</div>
    <div class="title">REVISION TRACKER</div>
  </div>
  <div class="header-right">
    R1=24h · R2=7d · R3=30d
    <div id="overdue-badge" style="display:none" class="overdue-badge"></div>
    <button class="install-btn" id="install-btn" onclick="installApp()">📲 Install</button>
  </div>
</div>

<div class="container">
  <div class="add-box">
    <div class="add-label">+ ADD COMPLETED LECTURE</div>
    <div class="row">
      <select id="sel-subject">
        <option>Accounts</option>
        <option>Business Laws</option>
        <option>Business Economics</option>
        <option>QA</option>
      </select>
      <input id="inp-lno" placeholder="Lecture No." type="number"/>
    </div>
    <div class="row2">
      <input id="inp-topic" placeholder="Topic (e.g. Indian Regulatory Framework)"/>
      <button class="add-btn" onclick="addLecture()">ADD</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-due" onclick="switchTab('due')">DUE (<span id="due-count">0</span>)</button>
    <button class="tab" id="tab-all" onclick="switchTab('all')">ALL (<span id="all-count">0</span>)</button>
  </div>

  <div id="panel-due"></div>
  <div id="panel-all" style="display:none"></div>
</div>

<script>
const DAY = 86400000;
const COLORS = { "Accounts":"#f59e0b","Business Laws":"#10b981","Business Economics":"#3b82f6","QA":"#ef4444" };
let lectures = JSON.parse(localStorage.getItem("ca-rev-lectures")||"[]");
let activeTab = "due";
let deferredPrompt = null;

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById("install-btn").style.display = "inline-block";
});

function installApp() {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; document.getElementById("install-btn").style.display = "none"; }
}

function save() { localStorage.setItem("ca-rev-lectures", JSON.stringify(lectures)); }

function addLecture() {
  const subject = document.getElementById("sel-subject").value;
  const lno = document.getElementById("inp-lno").value.trim();
  const topic = document.getElementById("inp-topic").value.trim();
  if (!topic && !lno) return;
  lectures.unshift({ id: Date.now(), subject, lno, name: topic||"Lecture "+lno, completedAt: Date.now(), r1:false, r2:false, r3:false });
  save(); document.getElementById("inp-lno").value=""; document.getElementById("inp-topic").value=""; render();
}

function markRevision(id, rev) {
  lectures = lectures.map(l => l.id===id ? {...l,[rev]:true} : l);
  save(); render();
}

function deleteLecture(id) {
  if (!confirm("Delete this entry?")) return;
  lectures = lectures.filter(l => l.id!==id);
  save(); render();
}

function timeUntil(ts) {
  const diff = ts - Date.now();
  if (diff<=0) return "OVERDUE";
  const hrs = Math.floor(diff/3600000);
  if (hrs<24) return hrs+"h left";
  return Math.floor(diff/DAY)+"d left";
}

function fmtDate(ts) { return new Date(ts).toLocaleDateString("en-IN",{day:"numeric",month:"short"}); }

function getDue() {
  const now = Date.now(), items = [];
  lectures.forEach(l => {
    const r1=l.completedAt+DAY, r2=l.completedAt+7*DAY, r3=l.completedAt+30*DAY;
    if (!l.r1&&now>=r1-DAY) items.push({...l,rev:"r1",due:r1,overdue:now>r1});
    else if (!l.r2&&now>=r2-3*DAY) items.push({...l,rev:"r2",due:r2,overdue:now>r2});
    else if (!l.r3&&now>=r3-5*DAY) items.push({...l,rev:"r3",due:r3,overdue:now>r3});
  });
  return items;
}

function switchTab(tab) {
  activeTab=tab;
  document.getElementById("tab-due").className="tab"+(tab==="due"?" active":"");
  document.getElementById("tab-all").className="tab"+(tab==="all"?" active":"");
  document.getElementById("panel-due").style.display=tab==="due"?"block":"none";
  document.getElementById("panel-all").style.display=tab==="all"?"block":"none";
}

function render() {
  const dueItems = getDue();
  const overdueCount = dueItems.filter(i=>i.overdue).length;
  document.getElementById("due-count").textContent=dueItems.length;
  document.getElementById("all-count").textContent=lectures.length;
  const badge=document.getElementById("overdue-badge");
  if (overdueCount>0){badge.style.display="inline-block";badge.textContent=overdueCount+" OVERDUE";}
  else badge.style.display="none";

  const duePanel=document.getElementById("panel-due");
  duePanel.innerHTML = dueItems.length===0 ? '<div class="empty">✓ No revisions due right now</div>' :
    dueItems.map(item=>{
      const color=COLORS[item.subject];
      const rl={r1:"R1·24h",r2:"R2·7d",r3:"R3·30d"}[item.rev];
      return `<div class="card${item.overdue?' overdue':''}" style="border-left:3px solid ${item.overdue?'#ef4444':color}">
        <div class="due-card">
          <div>
            <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
              <span class="badge" style="background:${color}">${item.subject.slice(0,3).toUpperCase()}</span>
              <span class="rev-label${item.overdue?' overdue':''}">${rl} · ${item.overdue?'OVERDUE':timeUntil(item.due)}</span>
            </div>
            <div class="topic">${item.lno?'<span class="lect-no">L'+item.lno+' · </span>':''}${item.name}</div>
            <div class="date-info">Studied: ${fmtDate(item.completedAt)}</div>
          </div>
          <button class="done-btn" onclick="markRevision(${item.id},'${item.rev}')">DONE ✓</button>
        </div>
      </div>`;
    }).join("");

  const allPanel=document.getElementById("panel-all");
  const now=Date.now();
  allPanel.innerHTML = lectures.length===0 ? '<div class="empty">No lectures added yet</div>' :
    lectures.map(l=>{
      const color=COLORS[l.subject];
      const r1=l.completedAt+DAY, r2=l.completedAt+7*DAY, r3=l.completedAt+30*DAY;
      function rb(rev,label,done,due){
        const od=now>due&&!done, rd=now>=due-DAY&&!done&&!od;
        let cls="rev-btn"+(done?" done":od?" overdue":rd?" ready":"");
        const clk=(!done&&(rd||od))?`onclick="markRevision(${l.id},'${rev}')"` :"";
        return `<button class="${cls}" ${clk}>${done?"✓":""}${label}</button>`;
      }
      return `<div class="card" style="border-left:3px solid ${color}">
        <div class="all-card-top">
          <div>
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
              <span class="badge" style="background:${color}">${l.subject.slice(0,3).toUpperCase()}</span>
              ${l.lno?`<span class="lect-no">L${l.lno}</span>`:""}
            </div>
            <div class="topic">${l.name}</div>
            <div class="date-info">Added: ${fmtDate(l.completedAt)}</div>
          </div>
          <button class="del-btn" onclick="deleteLecture(${l.id})">×</button>
        </div>
        <div class="rev-btns">
          ${rb("r1","R1·24h",l.r1,r1)}
          ${rb("r2","R2·7d",l.r2,r2)}
          ${rb("r3","R3·30d",l.r3,r3)}
        </div>
      </div>`;
    }).join("");
}

document.getElementById("inp-topic").addEventListener("keydown",e=>{if(e.key==="Enter")addLecture();});
render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
  </html>
